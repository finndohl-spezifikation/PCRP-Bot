<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paradise City â€” Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0f14;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(99,102,241,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(139,92,246,0.15) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
    animation: fadeUp .4s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-icon {
    display: inline-flex;
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    align-items: center;
    justify-content: center;
    font-size: 34px;
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    margin-bottom: 18px;
  }

  h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: .3px;
  }

  .sub {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    text-align: center;
    margin-top: 5px;
    margin-bottom: 36px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  .error {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }

  .field-label {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: .6px;
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 4px;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    padding: 13px 16px 13px 46px;
    outline: none;
    transition: border-color .2s, background .2s;
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

  .input-wrap input:focus {
    border-color: rgba(99,102,241,0.6);
    background: rgba(255,255,255,0.08);
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 17px;
    pointer-events: none;
  }

  .hint {
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    margin-top: 5px;
    margin-bottom: 0;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .3px;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 6px 20px rgba(99,102,241,0.35);
    margin-top: 24px;
  }

  .btn:hover  { opacity: .9; }
  .btn:active { transform: scale(.98); }

  .footer-note {
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    margin-top: 28px;
    letter-spacing: .3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#x1F3D9;</div>
    <h1>Paradise City</h1>
    <p class="sub">Admin Dashboard</p>
  </div>

  {% if error %}
  <div class="error">&#x274C; {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field-label">Discord User ID</div>
    <div class="input-wrap">
      <span class="input-icon">&#x1F194;</span>
      <input type="text" name="discord_id" placeholder="z.B. 123456789012345678" autofocus required inputmode="numeric" pattern="[0-9]+">
    </div>
    <p class="hint">Rechtsklick auf deinen Namen in Discord &rarr; &bdquo;ID kopieren&ldquo;</p>

    <div class="field-label">Passwort</div>
    <div class="input-wrap">
      <span class="input-icon">&#x1F512;</span>
      <input type="password" name="password" placeholder="Passwort eingeben&#x2026;" required>
    </div>

    <button type="submit" class="btn">Einloggen</button>
  </form>

  <p class="footer-note">Nur f&uuml;r berechtigte Team-Mitglieder &mdash; Paradise City Roleplay</p>
</div>
</body>
</html>
